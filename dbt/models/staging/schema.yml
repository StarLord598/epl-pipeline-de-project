version: 2

sources:
  - name: raw
    schema: raw
    freshness:
      warn_after: {count: 24, period: hour}
      error_after: {count: 72, period: hour}
    loaded_at_field: ingested_at
    tables:
      - name: matches
        description: "Raw EPL match results from football-data.org and StatsBomb"
        columns:
          - name: match_id
            description: "Unique match identifier"
            tests: [not_null]
          - name: ingested_at
            description: "Timestamp when row was loaded into DuckDB"
            tests: [not_null]
      - name: events
        description: "Raw match events from StatsBomb Open Data (129k+ rows)"
        freshness: null
      - name: lineups
        description: "Raw match lineups from StatsBomb Open Data"
        freshness: null
      - name: top_scorers
        description: "Top scorers for the 2023-24 season"
        identifier: top_scorers_2324
        freshness: null
      - name: live_standings
        description: "Live EPL standings from football-data.org API (refreshed every 15 min)"
        freshness:
          warn_after: {count: 1, period: hour}
          error_after: {count: 4, period: hour}
      - name: live_matches
        description: "Live EPL match data from football-data.org API (refreshed every 15 min)"
        freshness:
          warn_after: {count: 1, period: hour}
          error_after: {count: 4, period: hour}

models:
  - name: stg_matches
    description: "Cleaned EPL matches with derived winner field"
    columns:
      - name: match_id
        tests: [unique, not_null]
      - name: match_status
        tests: [not_null]

  - name: stg_standings
    description: "Current EPL standings derived from match results"
    columns:
      - name: team_id
        tests: [unique, not_null]
      - name: points
        tests: [not_null]

  - name: stg_top_scorers
    description: "Top scorers from the raw top_scorers table"
    columns:
      - name: player_id
        tests: [unique, not_null]

  - name: stg_live_standings
    description: "Cleaned live EPL standings — deduped to latest ingest, normalized names"
    columns:
      - name: position
        tests: [not_null]
      - name: team_name
        tests: [unique, not_null]
      - name: points
        tests: [not_null]

  - name: stg_live_matches
    description: "Cleaned live EPL matches — normalized statuses, EPL-only filter"
    columns:
      - name: match_id
        tests: [not_null]
