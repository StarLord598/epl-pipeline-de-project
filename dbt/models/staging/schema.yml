version: 2

sources:
  - name: raw
    schema: raw
    tables:
      - name: matches
      - name: events
      - name: lineups
      - name: player_stats

models:
  - name: stg_matches
    description: Cleaned EPL matches with derived winner field
    columns:
      - name: match_id
        tests: [unique, not_null]
      - name: match_status
        tests: [not_null]

  - name: stg_standings
    description: Current EPL standings derived from match results
    columns:
      - name: team_id
        tests: [unique, not_null]
      - name: points
        tests: [not_null]

  - name: stg_top_scorers
    description: Top scorers derived from event data
    columns:
      - name: player_id
        tests: [unique, not_null]
