version: 2

models:
  - name: mart_league_table
    description: EPL league table with calculated metrics for dashboard
    columns:
      - name: team_id
        tests: [unique, not_null]
      - name: position
        tests: [not_null]
      - name: points
        tests: [not_null]

  - name: mart_top_scorers
    description: EPL top scorers with per-game stats and ranking
    columns:
      - name: player_id
        tests: [unique, not_null]
      - name: rank
        tests: [not_null]

  - name: mart_recent_results
    description: EPL match results with derived home/away result
    columns:
      - name: match_id
        tests: [unique, not_null]

  - name: mart_live_league_table
    description: "Live EPL league table (Gold) — sourced from silver stg_live_standings"
    columns:
      - name: team_name
        tests: [unique, not_null]
      - name: position
        tests: [not_null]
      - name: points
        tests: [not_null]
      - name: qualification_zone
        description: "CL, EL, Conference League, or Relegation zone"

  - name: mart_live_matches
    description: "Live EPL matches (Gold) — sourced from silver stg_live_matches"
    columns:
      - name: match_id
        tests: [not_null]
