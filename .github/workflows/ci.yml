name: CI — EPL Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & dbt Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install duckdb dbt-core dbt-duckdb requests python-dotenv sqlfluff

      - name: Lint SQL with SQLFluff
        run: |
          cd dbt
          sqlfluff lint models/ --dialect duckdb --ignore parsing || true

      - name: Lint Python
        run: |
          pip install ruff
          ruff check scripts/ --ignore E501,E701,F401 || true

      - name: Seed DuckDB (create schema)
        run: |
          python -c "
          import duckdb
          conn = duckdb.connect('data/epl_pipeline.duckdb')
          conn.execute('CREATE SCHEMA IF NOT EXISTS raw')
          conn.execute('CREATE SCHEMA IF NOT EXISTS staging')
          conn.execute('CREATE SCHEMA IF NOT EXISTS mart')
          # Create minimal raw tables for dbt to compile against
          conn.execute('''CREATE TABLE IF NOT EXISTS raw.live_matches (
            match_id INTEGER, home_team_name VARCHAR, away_team_name VARCHAR,
            home_score INTEGER, away_score INTEGER, status VARCHAR,
            utc_date TIMESTAMP, source VARCHAR, ingested_at TIMESTAMP,
            raw_json JSON, winner VARCHAR
          )''')
          conn.execute('''CREATE TABLE IF NOT EXISTS raw.live_standings (
            team_name VARCHAR, position INTEGER, played_games INTEGER,
            won INTEGER, draw INTEGER, lost INTEGER, points INTEGER,
            goals_for INTEGER, goals_against INTEGER, goal_difference INTEGER,
            form VARCHAR, source VARCHAR, ingested_at TIMESTAMP, raw_json JSON
          )''')
          conn.execute('''CREATE TABLE IF NOT EXISTS raw.matches (
            match_id INTEGER, home_team VARCHAR, away_team VARCHAR,
            home_score INTEGER, away_score INTEGER, match_date DATE,
            competition VARCHAR, season VARCHAR, match_week INTEGER,
            ingested_at TIMESTAMP
          )''')
          conn.execute('''CREATE TABLE IF NOT EXISTS raw.events (
            event_id VARCHAR, match_id INTEGER, minute INTEGER,
            type VARCHAR, team VARCHAR, player VARCHAR,
            outcome VARCHAR, ingested_at TIMESTAMP
          )''')
          conn.execute('''CREATE TABLE IF NOT EXISTS raw.standings (
            team VARCHAR, position INTEGER, played INTEGER,
            won INTEGER, drawn INTEGER, lost INTEGER, gf INTEGER,
            ga INTEGER, gd INTEGER, points INTEGER, season VARCHAR,
            ingested_at TIMESTAMP
          )''')
          conn.execute('''CREATE TABLE IF NOT EXISTS raw.top_scorers (
            player VARCHAR, team VARCHAR, goals INTEGER, assists INTEGER,
            penalty_goals INTEGER, matches_played INTEGER, season VARCHAR,
            ingested_at TIMESTAMP
          )''')
          conn.close()
          print('CI seed complete')
          "

      - name: Run dbt build (models + tests)
        run: |
          cd dbt
          dbt build --profiles-dir . --target local
        env:
          DBT_PROFILES_DIR: ./dbt

      - name: Verify model count
        run: |
          cd dbt
          dbt ls --resource-type model --profiles-dir . --target local | wc -l

  dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install & Build
        run: |
          cd dashboard
          npm ci
          npm run build
