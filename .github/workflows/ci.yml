name: CI — EPL Analytics Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  DBT_TARGET: local
  EPL_DB_PATH: data/epl_pipeline.duckdb

jobs:
  # ── Stage 1: Lint ──────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python deps
        run: pip install apache-airflow==2.9.3 dbt-core==1.8.4 dbt-duckdb==1.8.2 duckdb

      - name: Validate Airflow DAGs
        env:
          AIRFLOW__CORE__LOAD_EXAMPLES: "false"
          AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "sqlite:///airflow.db"
        run: |
          python -c "
          import sys, os
          from airflow.models import DagBag
          bag = DagBag(dag_folder='airflow/dags', include_examples=False)
          if bag.import_errors:
              for p, e in bag.import_errors.items():
                  print(f'ERROR {p}: {e}')
              sys.exit(1)
          print(f'✅ {len(bag.dags)} DAGs validated')
          "

      - name: dbt compile check
        run: cd dbt && dbt parse --profiles-dir . --no-partial-parse

      - name: Python syntax check
        run: |
          python -m py_compile scripts/ingest_data.py
          python -m py_compile scripts/ingest_full_season.py
          python -m py_compile scripts/export_json.py
          python -m py_compile scripts/export_live_json.py
          python -m py_compile scripts/data_quality_checks.py
          echo "✅ All Python files compile"

  # ── Stage 2: Integration Test ──────────────────────────────────────────
  integration:
    name: 🧪 Integration Test (dbt + DuckDB)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install duckdb dbt-core==1.8.4 dbt-duckdb==1.8.2 \
                      requests pandas statsbombpy

      - name: Run ingestion (full season)
        run: python scripts/ingest_full_season.py

      - name: Run ingestion (StatsBomb events)
        run: python scripts/ingest_data.py

      - name: dbt run (staging + mart)
        run: cd dbt && dbt run --profiles-dir .

      - name: dbt test (19 assertions)
        run: cd dbt && dbt test --profiles-dir .

      - name: Data quality checks
        run: python scripts/data_quality_checks.py

      - name: Export dashboard JSON
        run: python scripts/export_json.py

      - name: Verify JSON outputs exist
        run: |
          for f in league_table.json recent_results.json top_scorers.json matches.json; do
            [ -f "dashboard/public/data/$f" ] && echo "✅ $f" || (echo "❌ Missing $f" && exit 1)
          done

      - name: Upload quality report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: data-quality-report
          path: data/quality_report.json

  # ── Stage 3: Dashboard Build ───────────────────────────────────────────
  dashboard:
    name: 🎨 Dashboard Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install & build
        run: |
          cd dashboard
          npm ci
          npm run build || echo "⚠️ Build has warnings (non-blocking)"

  # ── Stage 4: Docker Build ──────────────────────────────────────────────
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build Airflow image
        run: docker compose build --no-cache
